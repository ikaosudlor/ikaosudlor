name: generate animation

on:
  # รันอัตโนมัติทุกๆ 24 ชั่วโมง
  schedule:
    - cron: "0 0 * * *" 
  
  # กดรันเองได้จากเมนู Actions
  workflow_dispatch:
  
  # รันทุกครั้งที่มีการ push ไปที่ main branch
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#FFFF00
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#FFFF00

      # push the content of <build_dir> to a branch
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
